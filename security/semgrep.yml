rules:
  - id: devsecops.security.hardcoded-uuid
    patterns:
      - pattern-regex: "(?i)\\b[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\\b"
    message: "Hardcoded UUID detectado no código. Evite usar UUIDs fixos diretamente (podem ser credenciais, identificadores vázados ou causar problemas nos ambientes)."
    languages: [generic]
    severity: WARNING
    paths:
      exclude:
        - "*.json"
        - "**/data/**"
        - "**/test/**"
        - "**/tests/**"
        - "**/mock/**"
        - "**/mocks/**"
        - "**/fixtures/**"
        - "**/seed/**"
        - "**/seeds/**"
        - "**/.scannerwork/**"
        - "**/migrations/**"

  - id: devsecops.security.hardcoded-api-key
    patterns:
      - pattern-regex: "(?i)(api[_-]?key|secret[_-]?key|auth[_-]?token|access[_-]?token|password|secret|token)\\s*[:=]\\s*['\"][A-Za-z0-9_\\-+=!@#$%^&*]{8,}['\"]"
      - pattern-not-regex: "(?i)process\\.env\\."
      - pattern-not-regex: "(?i)(example|placeholder|dummy|changeme|your[_-])"
    message: "🚨 BLOCKED: Chave de API, Token ou Password hardcoded detectado. Nunca commite credenciais no código-fonte! Use variáveis de ambiente."
    languages: [generic]
    severity: ERROR
    paths:
      exclude:
        - "*.example"
        - "*.sample"
        - ".env.example"
        - "**/test/**"
        - "**/tests/**"
        - "**/mock/**"
        - "**/mocks/**"

  - id: devsecops.security.hardcoded-connection-string
    patterns:
      - pattern-regex: "(?i)(database_url|connection_string|mongo_uri|redis_url|postgres_url|mysql_url)\\s*[:=]\\s*['\"][^'\"]{10,}['\"]"
      - pattern-not-regex: "(?i)process\\.env\\."
      - pattern-not-regex: "(?i)(example|placeholder|localhost|127\\.0\\.0\\.1)"
    message: "🚨 BLOCKED: Connection string hardcoded detectada. Use variáveis de ambiente para credenciais de banco."
    languages: [generic]
    severity: ERROR
    paths:
      exclude:
        - "*.example"
        - ".env.example"
        - "docker-compose*.yml"

  - id: devsecops.security.insecure-random
    patterns:
      - pattern-regex: "Math\\.random\\(\\)"
    message: "⚠️ Math.random() não é criptograficamente seguro. Use crypto.randomBytes() ou crypto.randomUUID() para operações sensíveis."
    languages: [generic]
    severity: WARNING
    paths:
      exclude:
        - "**/test/**"
        - "**/tests/**"
