name: Alpha Build

on:
  workflow_call:

  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: read


jobs:
  build:
    name: Universal Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:

      # --------------------------------
      # Checkout
      # --------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ⚡ OTIMIZAÇÃO — Cache de node_modules
      # Cacheia node_modules diretamente. Se cache hit → pula npm ci.
      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      # --------------------------------
      # Detect project type
      # --------------------------------
      - name: Detect project type
        id: detect
        run: |

          if [ -f package.json ]; then
            echo "node=true" >> $GITHUB_OUTPUT
          fi

          if [ -f requirements.txt ] || [ -f pyproject.toml ]; then
            echo "python=true" >> $GITHUB_OUTPUT
          fi

          if [ -f Dockerfile ]; then
            echo "docker=true" >> $GITHUB_OUTPUT
          fi

          if [ -f tsconfig.json ]; then
            echo "typescript=true" >> $GITHUB_OUTPUT
          fi

      # =====================================================
      # NODE PROJECTS
      # =====================================================

      - name: Setup Node
        if: steps.detect.outputs.node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@area-tech-alpha'

      - name: Validate package.json
        if: steps.detect.outputs.node == 'true'
        run: |
          node -e "JSON.parse(require('fs').readFileSync('package.json'))"

      - name: Install Node dependencies
        if: steps.detect.outputs.node == 'true' && steps.cache-nm.outputs.cache-hit != 'true'
        run: |
          echo "📦 Installing dependencies (cache miss)"

          if [ -f package-lock.json ]; then
            npm ci --legacy-peer-deps || npm install --legacy-peer-deps
          else
            npm install --legacy-peer-deps
          fi
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------------
      # Prisma (auto detect)
      # --------------------------------

      - name: Generate Prisma Client
        if: steps.detect.outputs.node == 'true'
        env:
          # DATABASE_URL dummy — prisma generate só lê o schema, não conecta ao banco.
          # Sem isso, projetos que carregam prisma.config.ts/js falham com PrismaConfigEnvError.
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_dummy"
        run: |
          if [ -f prisma/schema.prisma ]; then
            echo "⚡ Generating Prisma Client"
            npx prisma generate
          fi

      # --------------------------------
      # Node Build
      # --------------------------------

      - name: Node Build
        if: steps.detect.outputs.node == 'true'
        run: |
          if node -e "process.exit(require('./package.json').scripts?.build ? 0 : 1)"; then
            echo "🏗 Running build"
            npm run build
          else
            echo "ℹ️ No build script found"
          fi

      # =====================================================
      # TYPESCRIPT
      # =====================================================

      - name: Type Check
        if: steps.detect.outputs.typescript == 'true'
        run: |
          echo "🔎 Running TypeScript type check"
          npx tsc --noEmit || true

      # =====================================================
      # PYTHON PROJECTS
      # =====================================================

      - name: Setup Python
        if: steps.detect.outputs.python == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: steps.detect.outputs.python == 'true'
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Install Python dev tools
        if: steps.detect.outputs.python == 'true'
        run: |
          pip install ruff bandit pip-audit pytest

      - name: Python Lint
        if: steps.detect.outputs.python == 'true'
        run: |
          ruff check . || true

      - name: Python Security Scan
        if: steps.detect.outputs.python == 'true'
        run: |
          if [ -d src ]; then
            bandit -r src -ll || true
          else
            bandit -r . -ll || true
          fi

      - name: Python Dependency Audit
        if: steps.detect.outputs.python == 'true'
        run: |
          pip-audit --progress-spinner=off || true

      - name: Python Tests
        if: steps.detect.outputs.python == 'true'
        run: |
          if [ -d tests ]; then
            pytest -q
          else
            echo "ℹ️ No tests found"
          fi

      # =====================================================
      # DOCKER PROJECTS
      # =====================================================

      - name: Docker Build
        if: steps.detect.outputs.docker == 'true'
        run: |
          echo "🐳 Validating Docker build"
          docker build -t alpha-ci-test .