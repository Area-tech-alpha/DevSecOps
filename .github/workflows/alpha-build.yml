name: Alpha Build

on:
  workflow_call:

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Project Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # --------------------------------
      # Checkout
      # --------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --------------------------------
      # Detect project type
      # --------------------------------
      - name: Detect project
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "node=true" >> $GITHUB_OUTPUT
          fi

          if [ -f Dockerfile ]; then
            echo "docker=true" >> $GITHUB_OUTPUT
          fi

      # --------------------------------
      # Setup Node
      # --------------------------------
      - name: Setup Node
        if: steps.detect.outputs.node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # --------------------------------
      # Ensure lockfile
      # --------------------------------
      - name: Ensure lockfile
        if: steps.detect.outputs.node == 'true'
        run: |
          if [ ! -f package-lock.json ]; then
            echo "❌ package-lock.json required"
            exit 1
          fi

      # --------------------------------
      # Install dependencies
      # --------------------------------
      - name: Install dependencies
        if: steps.detect.outputs.node == 'true'
        run: npm ci

      # --------------------------------
      # Validate package.json
      # --------------------------------
      - name: Validate package.json
        if: steps.detect.outputs.node == 'true'
        run: |
          node -e "JSON.parse(require('fs').readFileSync('package.json'))"

      # --------------------------------
      # Type check (TS)
      # --------------------------------
      - name: Type Check
        if: hashFiles('**/tsconfig.json') != ''
        run: npx tsc --noEmit

      # --------------------------------
      # Build project
      # --------------------------------
      - name: Build
        if: steps.detect.outputs.node == 'true'
        run: |
          if node -e "process.exit(require('./package.json').scripts?.build ? 0 : 1)"; then
            echo "🏗 Running build..."
            npm run build
          else
            echo "ℹ️ No build script"
          fi

      # --------------------------------
      # Docker build validation
      # --------------------------------
      - name: Docker Build
        if: steps.detect.outputs.docker == 'true'
        run: |
          echo "🐳 Validating Docker build"
          docker build -t alpha-ci-test .