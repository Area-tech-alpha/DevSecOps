name: Alpha Build

on:
  workflow_call:

  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: read


jobs:
  build:
    name: Universal Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:

      # --------------------------------
      # Checkout
      # --------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ⚡ OTIMIZAÇÃO — Cache de node_modules e Next.js
      # Cacheia dependências e build artifacts para acelerar compilações
      - name: Cache node_modules & Next.js Build
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next/cache
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      # --------------------------------
      # Detect project type
      # --------------------------------
      - name: Detect project type
        id: detect
        run: |

          if [ -s package.json ] && jq -e . package.json >/dev/null 2>&1; then
            echo "node=true" >> $GITHUB_OUTPUT
          fi

          if [ -f requirements.txt ] || [ -f pyproject.toml ]; then
            echo "python=true" >> $GITHUB_OUTPUT
          fi

          if [ -f Dockerfile ]; then
            echo "docker=true" >> $GITHUB_OUTPUT
          fi

          if [ -f tsconfig.json ]; then
            echo "typescript=true" >> $GITHUB_OUTPUT
          fi

      # =====================================================
      # NODE PROJECTS
      # =====================================================

      - name: Setup Node
        if: steps.detect.outputs.node == 'true' && steps.detect.outputs.docker != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@area-tech-alpha'

      - name: Validate package.json
        if: steps.detect.outputs.node == 'true' && steps.detect.outputs.docker != 'true'
        run: |
          jq . package.json >/dev/null

      - name: Create .npmrc for Auth
        if: steps.detect.outputs.node == 'true' && steps.cache-nm.outputs.cache-hit != 'true'
        run: |
          echo "@area-tech-alpha:registry=https://npm.pkg.github.com/" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Node dependencies
        if: steps.detect.outputs.node == 'true' && steps.cache-nm.outputs.cache-hit != 'true'
        run: |
          echo "📦 Installing dependencies (cache miss or update)"

          if [ -f package-lock.json ]; then
            npm ci --legacy-peer-deps --no-engine-strict --prefer-offline || npm install --legacy-peer-deps --no-engine-strict --prefer-offline
          else
            npm install --legacy-peer-deps --no-engine-strict --prefer-offline
          fi
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------------
      # Prisma (auto detect)
      # --------------------------------

      - name: Generate Prisma Client
        if: steps.detect.outputs.node == 'true' && steps.detect.outputs.docker != 'true'
        env:
          # DATABASE_URL dummy — prisma generate só lê o schema, não conecta ao banco.
          # Sem isso, projetos que carregam prisma.config.ts/js falham com PrismaConfigEnvError.
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_dummy"
        run: |
          if [ -f prisma/schema.prisma ]; then
            echo "⚡ Generating Prisma Client"
            npx prisma generate
          fi

      # --------------------------------
      # Node Build
      # --------------------------------

      - name: Node Build
        if: steps.detect.outputs.node == 'true' && steps.detect.outputs.docker != 'true'
        run: |
          if node -e "process.exit(require('./package.json').scripts?.build ? 0 : 1)"; then
            echo "🏗 Running build (Optimized)"
            # Se for Next.js, desabilitar telemetria economiza tempo
            npm run build
          else
            echo "ℹ️ No build script found"
          fi
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_dummy"
          NEXT_TELEMETRY_DISABLED: 1
          CI: true

      # =====================================================
      # TYPESCRIPT
      # =====================================================

      - name: Type Check
        if: steps.detect.outputs.typescript == 'true' && steps.detect.outputs.docker != 'true'
        run: |
          echo "🔎 Running TypeScript type check"
          npx tsc --noEmit
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_dummy"

      # =====================================================
      # PYTHON PROJECTS (Build/Install Only)
      # =====================================================

      - name: Setup Python
        if: steps.detect.outputs.python == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: steps.detect.outputs.python == 'true'
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # =====================================================
      # DOCKER PROJECTS
      # =====================================================

      - name: Docker Build
        if: steps.detect.outputs.docker == 'true'
        run: |
          echo "🐳 Validating Docker build"
          # No longer forcibly stripping --frozen-lockfile to prevent supply chain vulnerabilities
          docker build -t alpha-ci-test .