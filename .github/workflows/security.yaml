name: Alpha Security

on:
  workflow_call:

  pull_request:
    branches:
      - main


permissions:
  contents: read
  security-events: write


jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ⚡ Cache npm — acelera install antes dos scanners
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-security-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-security-
            ${{ runner.os }}-npm-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (if package.json exists)
        # --legacy-peer-deps: resolve conflito @nestjs/axios >=4 vs @nestjs/terminus <=10
        # --ignore-scripts: previne execução de scripts de build/postinstall (segurança)
        run: |
          if [ -f package.json ]; then
            if [ -f package-lock.json ]; then
              npm ci --legacy-peer-deps --ignore-scripts || npm install --legacy-peer-deps --ignore-scripts
            else
              npm install --legacy-peer-deps --ignore-scripts
            fi
          fi

      - name: Gitleaks
        run: |
          docker run --rm \
          -v ${{ github.workspace }}:/repo \
          ghcr.io/gitleaks/gitleaks:latest \
          detect --source="/repo" --redact -v

      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/security-audit

      - name: OSV Scanner
        run: |
          docker run --rm \
          -v ${{ github.workspace }}:/repo \
          ghcr.io/google/osv-scanner:latest \
          scan /repo

      - name: NPM Audit
        if: hashFiles('**/package-lock.json') != ''
        run: npm audit --audit-level=high