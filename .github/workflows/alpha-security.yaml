name: Alpha Security

on:
  workflow_call:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write
  packages: read

jobs:
  security:
    name: Universal Security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

# =====================================================
# 🧰 Ensure dependencies
# =====================================================

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

# =====================================================
# 🔎 Detect project type
# =====================================================

      - name: Detect project type
        id: detect
        run: |
          echo "🔍 Detectando tipo de projeto..."

          if [ -s package.json ] && jq -e . package.json >/dev/null 2>&1; then
            echo "node=true" >> $GITHUB_OUTPUT

            if jq -e '.dependencies.react or .devDependencies.react' package.json >/dev/null 2>&1; then
              echo "react=true" >> $GITHUB_OUTPUT
            fi
          fi

          if [ -f requirements.txt ] || [ -f pyproject.toml ]; then
            echo "python=true" >> $GITHUB_OUTPUT
          fi

          if [ -f Dockerfile ]; then
            echo "docker=true" >> $GITHUB_OUTPUT
          fi

          if [ -f go.mod ]; then
            echo "go=true" >> $GITHUB_OUTPUT
          fi

# =====================================================
# 🔑 Node Setup
# =====================================================

      - name: Setup Node
        if: steps.detect.outputs.node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

# =====================================================
# ⚡ Install security tools
# =====================================================

      - name: Install OSV Scanner
        run: |
          OSV_URL=$(curl -s https://api.github.com/repos/google/osv-scanner/releases/latest \
            | jq -r '.assets[] | select(.name | contains("linux_amd64") and (contains("exe") | not) and (contains("SHA256") | not)) | .browser_download_url' \
            | head -n1)

          curl -L "$OSV_URL" -o osv-scanner
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/

      - name: Install Gitleaks
        run: |
          URL=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | jq -r '.assets[] | select(.name | contains("linux_x64.tar.gz")) | .browser_download_url' \
            | head -n1)

          curl -L "$URL" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/
          rm gitleaks.tar.gz

      - name: Install Semgrep
        run: pip install semgrep --quiet --break-system-packages

# =====================================================
# 🔐 Checkout DevSecOps config
# =====================================================

      - name: Checkout DevSecOps Config
        uses: actions/checkout@v4
        with:
          repository: Area-tech-alpha/DevSecOps
          ref: main
          path: devsecops
          fetch-depth: 1

# =====================================================
# 🚀 Parallel Scans
# =====================================================

      - name: Run Security Scanners
        run: |
          echo "🔐 Rodando Gitleaks..."
          gitleaks detect --source="." --config="devsecops/security/gitleaks.toml" --redact -v &
          PID_GIT=$!

          echo "🔍 Detectando lockfiles para OSV..."
          LOCKFILES=$(find . -type d \( -name 'node_modules' -o -name 'venv' -o -name '.venv' -o -name '.git' \) -prune -o -type f \( -name "package-lock.json" \
                                -o -name "yarn.lock" \
                                -o -name "pnpm-lock.yaml" \
                                -o -name "go.mod" \
                                -o -name "requirements.txt" \
                                -o -name "poetry.lock" \) -print)

          if [ -z "$LOCKFILES" ]; then
            echo "⚠️ Nenhum lockfile encontrado — pulando OSV"
            SKIP_OSV=true
          else
            echo "📦 Rodando OSV Scanner..."
            echo "$LOCKFILES"

            CMD_ARGS=""
            for LF in $LOCKFILES; do
              CMD_ARGS="$CMD_ARGS -L $LF"
            done

            osv-scanner scan \
              --format json \
              $CMD_ARGS > osv-results.json 2>osv-errors.log &
            PID_OSV=$!
          fi

          echo "🛡️ Rodando Semgrep..."
          if [ "${{ steps.detect.outputs.react }}" == "true" ]; then
            semgrep scan --config="p/security-audit,p/react" --quiet &
          else
            semgrep scan --config="p/security-audit" --quiet &
          fi
          PID_SEM=$!

          set +e
          wait $PID_GIT; EXIT_GIT=$?

          if [ "$SKIP_OSV" != "true" ]; then
            wait $PID_OSV; EXIT_OSV=$?
          else
            EXIT_OSV=0
          fi

          wait $PID_SEM; EXIT_SEM=$?
          set -e

          echo "EXIT_GIT=$EXIT_GIT"
          echo "EXIT_OSV=$EXIT_OSV"
          echo "EXIT_SEM=$EXIT_SEM"

          if [ $EXIT_GIT -ne 0 ]; then
            echo "❌ Segredos detectados"
            exit 1
          fi

          if [ $EXIT_SEM -ne 0 ]; then
            echo "❌ Vulnerabilidades Semgrep"
            exit 1
          fi

          if [ "$SKIP_OSV" != "true" ] && [ $EXIT_OSV -ne 0 ]; then
            echo "⚠️ OSV Scanner detectou vulnerabilidades ou avisos (Exit: $EXIT_OSV). Delegando a decisão para o Security Gate..."
            cat osv-errors.log || true
          fi

# =====================================================
# 🔍 OSV Validation
# =====================================================

      - name: Validate OSV Results
        run: |
          if [ ! -f osv-results.json ]; then
            echo "ℹ️ OSV foi pulado — nenhum lockfile encontrado"
            exit 0
          fi

          if ! jq -e . osv-results.json >/dev/null 2>&1; then
            echo "❌ JSON inválido"
            cat osv-results.json || true
            exit 1
          fi

          RESULTS_COUNT=$(jq '.results | length' osv-results.json 2>/dev/null || echo 0)

          echo "📊 Results count: $RESULTS_COUNT"

          if [ -s osv-errors.log ]; then
            echo "⚠️ OSV warnings:"
            cat osv-errors.log
          fi

# =====================================================
# 🚨 Security Gate
# =====================================================

      - name: Enforce Security Gate
        run: |
          if [ ! -f osv-results.json ]; then
            echo "ℹ️ OSV não executado — pulando gate"
            exit 0
          fi

          HIGH_VULNS=$(jq '
            [
              .results[]?
              | (
                  .packages[]?.vulnerabilities[]?,
                  .vulnerabilities[]?
                )
              | select(
                  (.database_specific.cvssScore // 0) >= 7
                  or
                  ((.database_specific.severity // "") | ascii_upcase | test("HIGH|CRITICAL"))
                  or
                  ((.severity[]?.score | tonumber? // 0) >= 7)
                )
            ] | length
          ' osv-results.json)

          echo "🔢 HIGH/CRITICAL: $HIGH_VULNS"

          if (( HIGH_VULNS > 0 )); then
            echo "❌ Vulnerabilidades críticas detectadas"

            jq -r '
              .results[]?
              | (
                  (.packages[]? | . as $pkg | .vulnerabilities[]? | {vuln: ., name: $pkg.package.name, ver: $pkg.package.version}),
                  (.vulnerabilities[]? | {vuln: ., name: "Global", ver: "N/A"})
                )
              | select(
                  (.vuln.database_specific.cvssScore // 0) >= 7
                  or
                  ((.vuln.database_specific.severity // "") | ascii_upcase | test("HIGH|CRITICAL"))
                  or
                  ((.vuln.severity[]?.score | tonumber? // 0) >= 7)
                )
              | ([ .vuln.affected[]? | .ranges[]?.events[]?.fixed | select(type=="string") ] | .[0]) as $fixed
              | "• \(.vuln.id // "N/A") 🎯 Alvo: \(.name // "Desconhecido")@\(.ver // "?")\n  🚨 Ameaça: \(.vuln.summary // "Exploit Desconhecido")\n  💉 Fix: \(if $fixed != null then "Migre urgente para v\($fixed)+ (Rode: `npm install \(.name)@^\($fixed)` ou `pnpm update \(.name)@>=\($fixed)`)" else "Patch fix exato desconhecido no JSON. Forçe um update do pacote \(.name)." end)\n"
            ' osv-results.json

            exit 1
          fi

          echo "✅ Nenhuma vulnerabilidade crítica"

# =====================================================
# 📊 Summary
# =====================================================

      - name: Security Summary
        if: always()
        run: |
          echo "======================================"
          echo "🔐 Alpha Security Scan Completed"
          echo "======================================"

