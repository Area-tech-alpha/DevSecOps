name: Alpha Security

on:
  workflow_call:

  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write
  packages: read

jobs:
  security:
    name: "Universal Security"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      # --------------------------------
      # Detect project type
      # --------------------------------
      - name: Detect project type
        id: detect
        run: |
          echo "🔍 Detectando tipo de projeto..."

          if [ -f package.json ]; then
            echo "node=true" >> $GITHUB_OUTPUT
            echo "✅ Node.js detectado"

            # Detecta React (dependencies ou devDependencies)
            if node -e "
              const pkg = require('./package.json');
              const deps = { ...pkg.dependencies, ...pkg.devDependencies };
              process.exit(deps['react'] ? 0 : 1);
            " 2>/dev/null; then
              echo "react=true" >> $GITHUB_OUTPUT
              echo "⚛️  React detectado"
            fi
          fi

          if [ -f requirements.txt ] || [ -f pyproject.toml ] || [ -f setup.py ] || [ -f Pipfile ]; then
            echo "python=true" >> $GITHUB_OUTPUT
            echo "✅ Python detectado"
          fi

          if [ -f Dockerfile ]; then
            echo "docker=true" >> $GITHUB_OUTPUT
            echo "✅ Docker detectado"
          fi

          if [ -f go.mod ]; then
            echo "go=true" >> $GITHUB_OUTPUT
            echo "✅ Go detectado"
          fi

      # =====================================================
      # 🔑 AUTHENTICATION & OSV SETUP
      # =====================================================

      - name: Setup Node (for Registry Access)
        if: steps.detect.outputs.node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://npm.pkg.github.com
          scope: '@area-tech-alpha'

      - name: Create .npmrc for Auth
        if: steps.detect.outputs.node == 'true'
        run: |
          echo "@area-tech-alpha:registry=https://npm.pkg.github.com/" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache OSV-scanner binary
        id: cache-osv
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/osv-scanner
          key: osv-scanner-v1.9.0 # Use a fixed version or dynamic tag

      - name: Cache Security Binaries
        id: cache-bins
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/osv-scanner
            /usr/local/bin/gitleaks
          key: security-bins-v2

      - name: Install Native Security Tools
        if: steps.cache-bins.outputs.cache-hit != 'true'
        run: |
          echo "🛰️ Instalando ferramentas nativas (mais rápido que Docker)..."
          
          # OSV-Scanner
          OSV_URL=$(curl -sfL https://api.github.com/repos/google/osv-scanner/releases/latest | jq -r '.assets[] | select(.name | contains("linux_amd64")) | .browser_download_url' | head -n 1)
          curl -fL "$OSV_URL" -o osv-scanner && chmod +x osv-scanner && sudo mv osv-scanner /usr/local/bin/
          
          # Gitleaks
          LEAKS_URL=$(curl -sfL https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r '.assets[] | select(.name | contains("linux_x64.tar.gz")) | .browser_download_url' | head -n 1)
          curl -fL "$LEAKS_URL" -o gitleaks.tar.gz && tar -xzf gitleaks.tar.gz gitleaks && chmod +x gitleaks && sudo mv gitleaks /usr/local/bin/ && rm gitleaks.tar.gz

      - name: Install Semgrep (Native via Pip)
        run: |
          echo "�️ Instalando Semgrep via pip (Ultra-light)..."
          pip install semgrep --quiet

      # =====================================================
      # 🚀 TURBO PARALLEL SCANS
      # =====================================================

      # =====================================================
      # 🚀 PARALLEL SCANS (Within the same runner to save time)
      # =====================================================

      - name: Checkout DevSecOps Config (Security)
        uses: actions/checkout@v4
        with:
          repository: Area-tech-alpha/DevSecOps
          ref: main
          path: devsecops
          fetch-depth: 1

      - name: Run Scanners (Turbo Parallel)
        run: |
          echo "🔐 Rodando Gitleaks (Nativo)..."
          gitleaks detect --source="." --config="devsecops/security/gitleaks.toml" --redact -v &
          
          echo "📦 Rodando OSV Scanner (Nativo)..."
          echo '{"results":[]}' > osv-results.json
          osv-scanner scan --config="devsecops/security/osv-scanner.toml" --recursive --format json . > osv-results.json || true &
          
          echo "🛡️ Rodando Semgrep (Nativo)..."
          SEMGREP_RULES="${{ steps.detect.outputs.react == 'true' && 'p/security-audit,p/react' || 'p/security-audit' }}"
          semgrep ci --config="$SEMGREP_RULES" --quiet &
          
          wait
          echo "✅ Scanners finalizados."

      # =====================================================
      # 🛡️ ANALYSIS & SECURITY GATE
      # =====================================================

      # Semgrep foi movido para o bloco paralelo acima para economizar tempo.

      - name: OSV Scanner — Remediation Advice (Conditional)
        run: |
          # Verificamos se há vulnerabilidades antes de rodar o pesado 'osv-scanner fix'
          VULNS=$(jq '[.results[]?.packages[]?.vulnerabilities[]?] | length' osv-results.json 2>/dev/null || echo 0)
          if [ "$VULNS" -eq 0 ]; then
            echo "✅ Tudo limpo. Pulando etapa de remediação para economizar tempo."
            exit 0
          fi

          echo "💡 Calculando melhores versões para atualização..."
          find . -name "package-lock.json" -o -name "yarn.lock" -o -name "pnpm-lock.yaml" -o -name "go.sum" -o -name "Pipfile.lock" -o -name "poetry.lock" | while read -r lockfile; do
            DIR=$(dirname "$lockfile")
            BASE=$(basename "$lockfile")
            MANIFEST=""
            case "$BASE" in
              "package-lock.json"|"yarn.lock"|"pnpm-lock.yaml") MANIFEST="$DIR/package.json" ;;
              "go.sum") MANIFEST="$DIR/go.mod" ;;
              "Pipfile.lock") MANIFEST="$DIR/Pipfile" ;;
              "poetry.lock") MANIFEST="$DIR/pyproject.toml" ;;
            esac
            REL_LOCK=${lockfile#./}
            if [ -n "$MANIFEST" ] && [ -f "$MANIFEST" ]; then
              REL_MANIFEST=${MANIFEST#./}
              osv-scanner fix --strategy=relax --upgrade-config=major --data-source=native -M "$REL_MANIFEST" -L "$REL_LOCK" || true
            else
              osv-scanner fix --strategy=relax --upgrade-config=major --data-source=native -L "$REL_LOCK" || true
            fi
          done

      - name: Enforce Security Gate (Fail on High/Critical)
        run: |
          echo "⚖️ Verificando severidade das vulnerabilidades..."
          if [ -f osv-results.json ]; then
            echo "--- RESUMO DE VULNERABILIDADES (HIGH/CRITICAL) ---"
            jq -r '.results[]?.packages[]? as $pkg | $pkg.vulnerabilities[]? | select(.database_specific.cvssScore >= 7 or .database_specific.severity == "HIGH" or .database_specific.severity == "CRITICAL") | "🚩 ID: \(.id) | Pacote: \($pkg.package.name) | Score: \(.database_specific.cvssScore // \"N/A\")"' osv-results.json 2>/dev/null || echo "Nenhuma vulnerabilidade crítica encontrada."
            echo "--------------------------------------------------"
          fi
          HIGH_VULNS=$(jq '[.results[]?.packages[]?.vulnerabilities[]? | select(.database_specific.cvssScore >= 7 or .database_specific.severity == "HIGH" or .database_specific.severity == "CRITICAL")] | length' osv-results.json 2>/dev/null || echo 0)
          HIGH_VULNS=${HIGH_VULNS:-0}
          
          if [[ ! "$HIGH_VULNS" =~ ^[0-9]+$ ]]; then HIGH_VULNS=0; fi

          [ "$HIGH_VULNS" -gt 0 ] && { echo "❌ ERRO: Foram encontradas $HIGH_VULNS vulnerabilidades HIGH/CRITICAL!"; exit 1; } || echo "✅ Nenhuma vulnerabilidade crítica."

      # =====================================================
      # 📦 LIGHTWEIGHT AUDITS (No install needed)
      # =====================================================

      - name: NPM Audit (Lightweight)
        if: steps.detect.outputs.node == 'true' && hashFiles('**/package-lock.json') != ''
        run: npm audit --audit-level=high || true

      - name: pip-audit (Lightweight)
        if: steps.detect.outputs.python == 'true'
        run: |
          pip install pip-audit
          if [ -f requirements.txt ]; then pip-audit -r requirements.txt || true; fi

      # =====================================================
      # FINAL SUMMARY
      # =====================================================

      - name: Security Scan Summary
        if: always()
        run: |
          echo "============================================"
          echo "📊 Security Scan Summary (Optimized)"
          echo "============================================"
          echo "  🔐 Gitleaks      → Executado"
          echo "  🛡️ Semgrep       → Executado"
          echo "  📦 OSV Scanner   → Executado (Nativo)"
          echo "  📦 Audits        → Executado (Lightweight)"
          echo "============================================"