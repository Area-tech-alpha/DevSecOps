name: Alpha Security

on:
  workflow_call:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write
  packages: read

jobs:
  security:
    name: Universal Security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

# =====================================================
# 🧰 Ensure dependencies
# =====================================================

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

# =====================================================
# 🔎 Detect project type
# =====================================================

      - name: Detect project type
        id: detect
        run: |
          echo "🔍 Detectando tipo de projeto..."

          if [ -s package.json ] && jq -e . package.json >/dev/null 2>&1; then
            echo "node=true" >> $GITHUB_OUTPUT

            if jq -e '.dependencies.react or .devDependencies.react' package.json >/dev/null 2>&1; then
              echo "react=true" >> $GITHUB_OUTPUT
            fi
          fi

          if [ -f requirements.txt ] || [ -f pyproject.toml ]; then
            echo "python=true" >> $GITHUB_OUTPUT
          fi

          if [ -f Dockerfile ]; then
            echo "docker=true" >> $GITHUB_OUTPUT
          fi

          if [ -f go.mod ]; then
            echo "go=true" >> $GITHUB_OUTPUT
          fi

# =====================================================
# 🔑 Node Setup
# =====================================================

      - name: Setup Node
        if: steps.detect.outputs.node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

# =====================================================
# ⚡ Install security tools
# =====================================================

      - name: Install OSV Scanner
        run: |
          OSV_URL=$(curl -s https://api.github.com/repos/google/osv-scanner/releases/latest \
            | jq -r '.assets[] | select(.name | contains("linux_amd64") and (contains("exe") | not) and (contains("SHA256") | not)) | .browser_download_url' \
            | head -n1)

          curl -L "$OSV_URL" -o osv-scanner
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/

      - name: Install Gitleaks
        run: |
          URL=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | jq -r '.assets[] | select(.name | contains("linux_x64.tar.gz")) | .browser_download_url' \
            | head -n1)

          curl -L "$URL" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/
          rm gitleaks.tar.gz

      - name: Install Semgrep
        run: pip install semgrep --quiet --break-system-packages

# =====================================================
# 🔐 Checkout DevSecOps config
# =====================================================

      - name: Checkout DevSecOps Config
        uses: actions/checkout@v4
        with:
          repository: Area-tech-alpha/DevSecOps
          ref: main
          path: devsecops
          fetch-depth: 1

# =====================================================
# 🚀 Parallel Scans
# =====================================================

      - name: Run Security Scanners
        id: scanners
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          # ── Gitleaks ──
          echo "🔐 Rodando Gitleaks..."
          gitleaks detect --source="." \
            --config="devsecops/security/gitleaks.toml" \
            --redact -v \
            --report-format sarif \
            --report-path gitleaks-results.sarif &
          PID_GIT=$!

          # ── OSV Scanner ──
          echo "🔍 Detectando lockfiles para OSV..."
          LOCKFILES=$(find . -type d \( -name 'node_modules' -o -name 'venv' -o -name '.venv' -o -name '.git' \) -prune -o -type f \( -name "package-lock.json" \
                                -o -name "yarn.lock" \
                                -o -name "pnpm-lock.yaml" \
                                -o -name "go.mod" \
                                -o -name "requirements.txt" \
                                -o -name "poetry.lock" \) -print)

          if [ -z "$LOCKFILES" ]; then
            echo "⚠️ Nenhum lockfile encontrado — pulando OSV"
            SKIP_OSV=true
          else
            echo "📦 Rodando OSV Scanner..."
            echo "$LOCKFILES"

            CMD_ARGS=""
            for LF in $LOCKFILES; do
              CMD_ARGS="$CMD_ARGS -L $LF"
            done

            osv-scanner scan \
              --config=devsecops/security/osv-scanner.toml \
              --format json \
              $CMD_ARGS > osv-results.json 2>osv-errors.log &
            PID_OSV=$!
          fi

          # ── Semgrep (JSON output for programmatic gate validation) ──
          echo "🛡️ Rodando Semgrep..."
          SEMGREP_CONFIGS="--config=p/security-audit --config=devsecops/security/semgrep.yml"
          if [ "${{ steps.detect.outputs.react }}" == "true" ]; then
            SEMGREP_CONFIGS="$SEMGREP_CONFIGS --config=p/react"
          fi

          # Primary scan: JSON output for gate validation
          semgrep scan $SEMGREP_CONFIGS \
            --json --output semgrep-results.json \
            --error \
            --severity ERROR &
          PID_SEM=$!

          # ── Wait for all processes ──
          set +e
          wait $PID_GIT; EXIT_GIT=$?

          if [ "$SKIP_OSV" != "true" ]; then
            wait $PID_OSV; EXIT_OSV=$?
          else
            EXIT_OSV=0
          fi

          wait $PID_SEM; EXIT_SEM=$?
          set -e

          echo "EXIT_GIT=$EXIT_GIT"
          echo "EXIT_OSV=$EXIT_OSV"
          echo "EXIT_SEM=$EXIT_SEM"

          # ── Save exit codes for downstream steps ──
          echo "exit_git=$EXIT_GIT" >> $GITHUB_OUTPUT
          echo "exit_osv=$EXIT_OSV" >> $GITHUB_OUTPUT
          echo "exit_sem=$EXIT_SEM" >> $GITHUB_OUTPUT
          echo "skip_osv=${SKIP_OSV:-false}" >> $GITHUB_OUTPUT

          # ── Evaluate Gitleaks ──
          if [ $EXIT_GIT -ne 0 ]; then
            echo "❌ Gitleaks: Segredos detectados no repositório!"
            echo "gitleaks_failed=true" >> $GITHUB_OUTPUT
          fi

          # ── Evaluate Semgrep via JSON (defense in depth — don't trust exit code alone) ──
          SEMGREP_FAILED=false
          if [ -f semgrep-results.json ]; then
            BLOCKING_COUNT=$(jq '[.results[] | select(.extra.severity == "ERROR")] | length' semgrep-results.json 2>/dev/null || echo 0)
            echo "🔍 Semgrep ERROR-severity findings: $BLOCKING_COUNT"

            if [ "$BLOCKING_COUNT" -gt 0 ]; then
              echo ""
              echo "❌ ══ SEMGREP BLOCKING FINDINGS ══"
              jq -r '.results[] | select(.extra.severity == "ERROR") | "  🚨 \(.check_id)\n     📄 \(.path):\(.start.line)\n     💬 \(.extra.message)\n"' semgrep-results.json
              SEMGREP_FAILED=true
            fi
          fi

          if [ $EXIT_SEM -ne 0 ] || [ "$SEMGREP_FAILED" = "true" ]; then
            echo "semgrep_failed=true" >> $GITHUB_OUTPUT
          fi

          # ── Evaluate OSV (delegate to Security Gate for layer analysis) ──
          if [ "$SKIP_OSV" != "true" ] && [ $EXIT_OSV -ne 0 ]; then
            echo "⚠️ OSV Scanner detectou vulnerabilidades (Exit: $EXIT_OSV). Delegando para o Security Gate..."
            cat osv-errors.log || true
          fi

# =====================================================
# 🔍 OSV Validation
# =====================================================

      - name: Validate OSV Results
        run: |
          if [ ! -f osv-results.json ]; then
            echo "ℹ️ OSV foi pulado — nenhum lockfile encontrado"
            exit 0
          fi

          if ! jq -e . osv-results.json >/dev/null 2>&1; then
            echo "❌ JSON inválido"
            cat osv-results.json || true
            exit 1
          fi

          RESULTS_COUNT=$(jq '.results | length' osv-results.json 2>/dev/null || echo 0)

          echo "📊 Results count: $RESULTS_COUNT"

          if [ -s osv-errors.log ]; then
            echo "⚠️ OSV warnings:"
            cat osv-errors.log
          fi

# =====================================================
# 🚨 Security Gate (Two-Layer: Direct BLOCK / Transitive WARN)
# =====================================================

      - name: Enforce Security Gate
        id: gate
        run: |
          GATE_FAILED=false

          # ════════════════════════════════════════
          # Layer 0: Gitleaks (secrets in code)
          # ════════════════════════════════════════
          if [ "${{ steps.scanners.outputs.gitleaks_failed }}" == "true" ]; then
            echo ""
            echo "❌ ══ GITLEAKS: SEGREDOS DETECTADOS ══"
            echo "O scan detectou credenciais ou segredos no código-fonte."
            echo "Remova todas as credenciais e use variáveis de ambiente."
            GATE_FAILED=true
          else
            echo "✅ Gitleaks: Nenhum segredo detectado"
          fi

          # ════════════════════════════════════════
          # Layer 0: Semgrep (SAST findings)
          # ════════════════════════════════════════
          if [ "${{ steps.scanners.outputs.semgrep_failed }}" == "true" ]; then
            echo ""
            echo "❌ ══ SEMGREP: VULNERABILIDADES BLOCKING ══"
            if [ -f semgrep-results.json ]; then
              BLOCKING=$(jq '[.results[] | select(.extra.severity == "ERROR")] | length' semgrep-results.json 2>/dev/null || echo "?")
              echo "Total de findings ERROR-severity: $BLOCKING"
              echo ""
              jq -r '.results[] | select(.extra.severity == "ERROR") | "  🚨 [\(.check_id)] \(.path):\(.start.line)\n     \(.extra.message)\n"' semgrep-results.json
            fi
            GATE_FAILED=true
          else
            echo "✅ Semgrep: Nenhuma vulnerabilidade blocking"
          fi

          # ════════════════════════════════════════
          # Layer 1+2: OSV (dependency vulnerabilities)
          # ════════════════════════════════════════
          if [ ! -f osv-results.json ]; then
            echo "ℹ️ OSV não executado — pulando gate"
          else
            # ── Extrair dependências diretas do package.json ──
            if [ -f package.json ]; then
              jq -r '[
                (.dependencies // {} | keys[]),
                (.devDependencies // {} | keys[])
              ] | unique | .[]' package.json > direct-deps-raw.txt

              DIRECT_COUNT=$(wc -l < direct-deps-raw.txt | tr -d ' ')
              echo "📦 Dependências diretas encontradas: $DIRECT_COUNT"

              # Converter lista para JSON array para uso no jq
              jq -R -s 'split("\n") | map(select(length > 0))' direct-deps-raw.txt > direct-deps.json
            else
              # Sem package.json (Go, Python, etc) → trata TUDO como direta (modo seguro)
              echo "⚠️ Sem package.json — todas as deps serão tratadas como diretas"
              echo '[]' > direct-deps.json
            fi

            # ── Helper: filtro jq para HIGH/CRITICAL ──
            SEVERITY_FILTER='(
              (.vuln.database_specific.cvssScore // 0) >= 7
              or ((.vuln.database_specific.severity // "") | ascii_upcase | test("HIGH|CRITICAL"))
              or ((.vuln.severity[]?.score | tonumber? // 0) >= 7)
            )'

            # Verifica se direct-deps.json está vazio (modo sem package.json)
            DIRECT_LIST_EMPTY=$(jq 'length == 0' direct-deps.json)

            # ── Layer 1: Contar vulns em dependências DIRETAS ──
            DIRECT_VULNS=$(jq --slurpfile direct direct-deps.json "
              [
                .results[]?
                | (.packages[]? | . as \$pkg | .vulnerabilities[]? | {vuln: ., name: \$pkg.package.name, ver: \$pkg.package.version})
                | select(
                    ( (\$direct[0] | length) == 0 or (.name as \$n | \$direct[0] | index(\$n) != null) )
                    and ${SEVERITY_FILTER}
                  )
              ] | length
            " osv-results.json)

            # ── Layer 2: Contar vulns em dependências TRANSITIVAS ──
            TRANSITIVE_VULNS=0
            if [ "$DIRECT_LIST_EMPTY" == "false" ]; then
              TRANSITIVE_VULNS=$(jq --slurpfile direct direct-deps.json "
                [
                  .results[]?
                  | (.packages[]? | . as \$pkg | .vulnerabilities[]? | {vuln: ., name: \$pkg.package.name, ver: \$pkg.package.version})
                  | select(
                      (.name as \$n | \$direct[0] | index(\$n) == null)
                      and ${SEVERITY_FILTER}
                    )
                ] | length
              " osv-results.json)
            fi

            echo ""
            echo "════════════════════════════════════════════════"
            echo "🔢 DIRETAS    HIGH/CRITICAL: $DIRECT_VULNS"
            echo "🔢 TRANSITIVAS HIGH/CRITICAL: $TRANSITIVE_VULNS"
            echo "════════════════════════════════════════════════"

            # ── Layer 2: WARNING — Transitivas (não bloqueiam) ──
            if (( TRANSITIVE_VULNS > 0 )); then
              echo ""
              echo "⚠️  ══ TRANSITIVAS COM VULNERABILIDADES (WARNING — não bloqueia) ══"
              jq -r --slurpfile direct direct-deps.json '
                .results[]?
                | (.packages[]? | . as $pkg | .vulnerabilities[]? | {vuln: ., name: $pkg.package.name, ver: $pkg.package.version})
                | select(
                    (.name as $n | $direct[0] | index($n) == null)
                    and (
                      (.vuln.database_specific.cvssScore // 0) >= 7
                      or ((.vuln.database_specific.severity // "") | ascii_upcase | test("HIGH|CRITICAL"))
                      or ((.vuln.severity[]?.score | tonumber? // 0) >= 7)
                    )
                  )
                | ([ .vuln.affected[]? | .ranges[]?.events[]?.fixed | select(type=="string") ] | .[0]) as $fixed
                | "  ⚠️  \(.vuln.id // "N/A") → \(.name)@\(.ver)\n     \(.vuln.summary // "Sem descrição")\n     Fix: \(if $fixed != null then "v\($fixed)+" else "Desconhecido" end)\n"
              ' osv-results.json
              echo ""
              echo "ℹ️  Transitivas não bloqueiam o pipeline. Corrija via overrides no package.json."
              echo "   Consulte: https://docs.npmjs.com/cli/v10/configuring-npm/package-json#overrides"
            fi

            # ── Layer 1: BLOCK — Diretas (bloqueiam o pipeline) ──
            if (( DIRECT_VULNS > 0 )); then
              echo ""
              echo "❌ ══ DIRETAS COM VULNERABILIDADES (BLOCKING) ══"
              jq -r --slurpfile direct direct-deps.json '
                .results[]?
                | (.packages[]? | . as $pkg | .vulnerabilities[]? | {vuln: ., name: $pkg.package.name, ver: $pkg.package.version})
                | select(
                    ( ($direct[0] | length) == 0 or (.name as $n | $direct[0] | index($n) != null) )
                    and (
                      (.vuln.database_specific.cvssScore // 0) >= 7
                      or ((.vuln.database_specific.severity // "") | ascii_upcase | test("HIGH|CRITICAL"))
                      or ((.vuln.severity[]?.score | tonumber? // 0) >= 7)
                    )
                  )
                | ([ .vuln.affected[]? | .ranges[]?.events[]?.fixed | select(type=="string") ] | .[0]) as $fixed
                | "• \(.vuln.id // "N/A") 🎯 Alvo: \(.name // "Desconhecido")@\(.ver // "?")\n  🚨 Ameaça: \(.vuln.summary // "Exploit Desconhecido")\n  💉 Fix: \(if $fixed != null then "Migre urgente para v\($fixed)+ (Rode: `npm install \(.name)@^\($fixed)` ou `pnpm update \(.name)@>=\($fixed)`)" else "Patch fix exato desconhecido. Forçe um update do pacote \(.name)." end)\n"
              ' osv-results.json

              GATE_FAILED=true
            fi

            if (( DIRECT_VULNS == 0 )); then
              echo ""
              echo "✅ Nenhuma vulnerabilidade crítica em dependências diretas"
            fi
          fi

          # ════════════════════════════════════════
          # 🚨 FINAL GATE DECISION
          # ════════════════════════════════════════
          echo ""
          if [ "$GATE_FAILED" = "true" ]; then
            echo "══════════════════════════════════════════"
            echo "🔴 SECURITY GATE: FAILED"
            echo "══════════════════════════════════════════"
            echo "O pipeline será bloqueado. Corrija os problemas acima antes de fazer merge."
            exit 1
          fi

          echo "══════════════════════════════════════════"
          echo "🟢 SECURITY GATE: PASSED"
          echo "══════════════════════════════════════════"

# =====================================================
# 📤 SARIF Upload — GitHub Security Tab
# =====================================================

      - name: Generate Semgrep SARIF
        if: always()
        run: |
          SEMGREP_CONFIGS="--config=p/security-audit --config=devsecops/security/semgrep.yml"
          if [ "${{ steps.detect.outputs.react }}" == "true" ]; then
            SEMGREP_CONFIGS="$SEMGREP_CONFIGS --config=p/react"
          fi
          semgrep scan $SEMGREP_CONFIGS \
            --sarif --output semgrep-results.sarif \
            --severity ERROR 2>/dev/null || true
        continue-on-error: true

      - name: Upload Semgrep SARIF
        if: always() && hashFiles('semgrep-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
        continue-on-error: true

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks
        continue-on-error: true

# =====================================================
# 📊 Summary
# =====================================================

      - name: Security Summary
        if: always()
        run: |
          echo "══════════════════════════════════════════"
          echo "🔐 Alpha Security Scan — Resumo Final"
          echo "══════════════════════════════════════════"
          echo ""
          echo "Estratégia do Gate:"
          echo "  🔴 BLOCK  → Segredos detectados (Gitleaks)"
          echo "  🔴 BLOCK  → Vulnerabilidades ERROR (Semgrep)"
          echo "  🔴 BLOCK  → Deps diretas com HIGH/CRITICAL (OSV)"
          echo "  🟡 WARN   → Deps transitivas com HIGH/CRITICAL"
          echo "  🟢 PASS   → Sem vulnerabilidades críticas"
          echo ""
          if [ -f direct-deps.json ]; then
            TOTAL_DIRECT=$(jq 'length' direct-deps.json)
            echo "  📦 Dependências diretas monitoradas: $TOTAL_DIRECT"
          fi
          if [ -f semgrep-results.json ]; then
            TOTAL_FINDINGS=$(jq '.results | length' semgrep-results.json 2>/dev/null || echo "N/A")
            BLOCKING_FINDINGS=$(jq '[.results[] | select(.extra.severity == "ERROR")] | length' semgrep-results.json 2>/dev/null || echo "N/A")
            echo "  🛡️ Semgrep findings total: $TOTAL_FINDINGS (blocking: $BLOCKING_FINDINGS)"
          fi
          echo "══════════════════════════════════════════"
