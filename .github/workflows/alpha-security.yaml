name: Alpha Security

on:
  workflow_call:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write
  packages: read

jobs:
  security:
    name: Universal Security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

# =====================================================
# 🔎 Detect project type
# =====================================================

      - name: Detect project type
        id: detect
        run: |
          echo "🔍 Detectando tipo de projeto..."

          if [ -f package.json ]; then
            echo "node=true" >> $GITHUB_OUTPUT
            echo "✅ Node detectado"

            if node -e "
              const pkg = require('./package.json');
              const deps = { ...pkg.dependencies, ...pkg.devDependencies };
              process.exit(deps['react'] ? 0 : 1);
            "; then
              echo "react=true" >> $GITHUB_OUTPUT
              echo "⚛️ React detectado"
            fi
          fi

          if [ -f requirements.txt ] || [ -f pyproject.toml ]; then
            echo "python=true" >> $GITHUB_OUTPUT
            echo "🐍 Python detectado"
          fi

          if [ -f Dockerfile ]; then
            echo "docker=true" >> $GITHUB_OUTPUT
            echo "🐳 Docker detectado"
          fi

          if [ -f go.mod ]; then
            echo "go=true" >> $GITHUB_OUTPUT
            echo "🐹 Go detectado"
          fi

# =====================================================
# 🔑 Node Setup
# =====================================================

      - name: Setup Node
        if: steps.detect.outputs.node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@area-tech-alpha'

      - name: Configure npm auth
        if: steps.detect.outputs.node == 'true'
        run: |
          echo "@area-tech-alpha:registry=https://npm.pkg.github.com/" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# =====================================================
# ⚡ Install security tools
# =====================================================

      - name: Install OSV Scanner
        run: |
          echo "📦 Instalando OSV Scanner..."
          OSV_URL=$(curl -s https://api.github.com/repos/google/osv-scanner/releases/latest \
            | jq -r '.assets[] | select(.name | contains("linux_amd64")) | .browser_download_url' \
            | head -n1)

          curl -L "$OSV_URL" -o osv-scanner
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/

      - name: Install Gitleaks
        run: |
          echo "🔐 Instalando Gitleaks..."
          URL=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | jq -r '.assets[] | select(.name | contains("linux_x64.tar.gz")) | .browser_download_url' \
            | head -n1)

          curl -L "$URL" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/
          rm gitleaks.tar.gz

      - name: Install Semgrep
        run: |
          pip install semgrep --quiet

# =====================================================
# 🔐 Checkout DevSecOps config
# =====================================================

      - name: Checkout DevSecOps Config
        uses: actions/checkout@v4
        with:
          repository: Area-tech-alpha/DevSecOps
          ref: main
          path: devsecops
          fetch-depth: 1

# =====================================================
# 🚀 Parallel Scans
# =====================================================

      - name: Run Security Scanners
        run: |
          echo "🔐 Rodando Gitleaks..."
          gitleaks detect \
            --source="." \
            --config="devsecops/security/gitleaks.toml" \
            --redact -v &

          echo "📦 Rodando OSV Scanner..."
          osv-scanner scan \
            --config="devsecops/security/osv-scanner.toml" \
            --recursive \
            --format json \
            --skip-git . > osv-results.json 2>/dev/null &

          echo "🛡️ Rodando Semgrep..."
          if [ "${{ steps.detect.outputs.react }}" == "true" ]; then
            semgrep ci --config="p/security-audit,p/react" --quiet &
          else
            semgrep ci --config="p/security-audit" --quiet &
          fi

          wait
          echo "✅ Scanners finalizados"

# =====================================================
# 💡 OSV remediation advice
# =====================================================

      - name: OSV Fix Suggestions
        run: |
          VULNS=$(jq '[.results[]?.packages[]?.vulnerabilities[]?] | length' osv-results.json 2>/dev/null)
          VULNS=${VULNS:-0}

          if (( VULNS == 0 )); then
            echo "✅ Nenhuma vulnerabilidade encontrada."
            exit 0
          fi

          echo "💡 Calculando possíveis upgrades..."

          find . -name "package-lock.json" \
                 -o -name "yarn.lock" \
                 -o -name "pnpm-lock.yaml" \
                 -o -name "go.sum" \
                 -o -name "Pipfile.lock" \
                 -o -name "poetry.lock" | while read lockfile; do

            DIR=$(dirname "$lockfile")
            BASE=$(basename "$lockfile")
            MANIFEST=""

            case "$BASE" in
              package-lock.json|yarn.lock|pnpm-lock.yaml)
                MANIFEST="$DIR/package.json"
                ;;
              go.sum)
                MANIFEST="$DIR/go.mod"
                ;;
              Pipfile.lock)
                MANIFEST="$DIR/Pipfile"
                ;;
              poetry.lock)
                MANIFEST="$DIR/pyproject.toml"
                ;;
            esac

            if [ -f "$MANIFEST" ]; then
              osv-scanner fix \
                --strategy=relax \
                --upgrade-config=major \
                --data-source=native \
                -M "$MANIFEST" \
                -L "$lockfile" || true
            else
              osv-scanner fix \
                --strategy=relax \
                --upgrade-config=major \
                --data-source=native \
                -L "$lockfile" || true
            fi

          done

# =====================================================
# 🚨 Security Gate
# =====================================================

      - name: Enforce Security Gate
        run: |
          echo "⚖️ Verificando severidade..."

          HIGH_VULNS=$(jq '
            [.results[]?
            | .packages[]?
            | .vulnerabilities[]?
            | select(
                ((.database_specific.cvssScore // 0) >= 7)
                or
                ((.database_specific.severity // "") | test("HIGH|CRITICAL"))
              )
            ] | length
          ' osv-results.json 2>/dev/null)

          HIGH_VULNS=${HIGH_VULNS:-0}

          if (( HIGH_VULNS > 0 )); then
            echo "❌ $HIGH_VULNS vulnerabilidades HIGH/CRITICAL detectadas"
            exit 1
          fi

          echo "✅ Nenhuma vulnerabilidade crítica."

# =====================================================
# 📦 Lightweight Audits
# =====================================================

      - name: NPM Audit
        if: steps.detect.outputs.node == 'true' && hashFiles('**/package-lock.json') != ''
        run: npm audit --audit-level=high || true

      - name: pip audit
        if: steps.detect.outputs.python == 'true'
        run: |
          pip install pip-audit
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt || true
          fi

# =====================================================
# 📊 Summary
# =====================================================

      - name: Security Summary
        if: always()
        run: |
          echo "======================================"
          echo "🔐 Alpha Security Scan Completed"
          echo "======================================"
          echo "Gitleaks  ✔"
          echo "Semgrep   ✔"
          echo "OSV Scan  ✔"
          echo "Audits    ✔"
          echo "======================================"