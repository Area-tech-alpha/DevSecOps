name: Alpha Security

on:
  workflow_call:

  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write
  packages: read

jobs:
  security:
    name: Universal Security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --------------------------------
      # Detect project type
      # --------------------------------
      - name: Detect project type
        id: detect
        run: |
          echo "🔍 Detectando tipo de projeto..."

          if [ -f package.json ]; then
            echo "node=true" >> $GITHUB_OUTPUT
            echo "✅ Node.js detectado"

            if node -e "
              const pkg = require('./package.json');
              const deps = { ...pkg.dependencies, ...pkg.devDependencies };
              process.exit(deps['react'] ? 0 : 1);
            " 2>/dev/null; then
              echo "react=true" >> $GITHUB_OUTPUT
              echo "⚛️ React detectado"
            fi
          fi

          if [ -f requirements.txt ] || [ -f pyproject.toml ] || [ -f setup.py ] || [ -f Pipfile ]; then
            echo "python=true" >> $GITHUB_OUTPUT
            echo "✅ Python detectado"
          fi

          if [ -f Dockerfile ]; then
            echo "docker=true" >> $GITHUB_OUTPUT
            echo "✅ Docker detectado"
          fi

          if [ -f go.mod ]; then
            echo "go=true" >> $GITHUB_OUTPUT
            echo "✅ Go detectado"
          fi

      # =====================================================
      # AUTH
      # =====================================================

      - name: Setup Node
        if: steps.detect.outputs.node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://npm.pkg.github.com
          scope: '@area-tech-alpha'

      - name: Create .npmrc
        if: steps.detect.outputs.node == 'true'
        run: |
          echo "@area-tech-alpha:registry=https://npm.pkg.github.com/" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # =====================================================
      # CACHE SECURITY TOOLS
      # =====================================================

      - name: Cache Security Binaries
        id: cache-bins
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/osv-scanner
            /usr/local/bin/gitleaks
          key: security-bins-v5

      # =====================================================
      # INSTALL SECURITY TOOLS
      # =====================================================

      - name: Install Security Tools
        if: steps.cache-bins.outputs.cache-hit != 'true'
        run: |
          echo "🛰️ Instalando ferramentas..."

          sudo apt-get update
          sudo apt-get install -y jq

          # OSV Scanner
          OSV_URL=$(curl -sfL https://api.github.com/repos/google/osv-scanner/releases/latest | jq -r '.assets[] | select(.name | contains("linux_amd64")) | .browser_download_url' | head -n 1)
          curl -fL "$OSV_URL" -o osv-scanner
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/

          # Gitleaks
          LEAKS_URL=$(curl -sfL https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r '.assets[] | select(.name | contains("linux_x64.tar.gz")) | .browser_download_url' | head -n 1)
          curl -fL "$LEAKS_URL" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/
          rm gitleaks.tar.gz

      - name: Install Semgrep
        run: |
          pip install semgrep --quiet

      # =====================================================
      # CHECKOUT SECURITY CONFIG
      # =====================================================

      - name: Checkout DevSecOps Config
        uses: actions/checkout@v4
        with:
          repository: Area-tech-alpha/DevSecOps
          ref: main
          path: devsecops
          fetch-depth: 1

      # =====================================================
      # PARALLEL SCANS
      # =====================================================

      - name: Run Scanners
        run: |
          set -e

          echo '{"results":[]}' > osv-results.json

          echo "🔐 Gitleaks..."
          gitleaks detect \
            --source="." \
            --config="devsecops/security/gitleaks.toml" \
            --redact \
            --exit-code 1 \
            -v &

          GITLEAKS_PID=$!

          echo "📦 OSV Scanner..."
          osv-scanner scan \
            --config="devsecops/security/osv-scanner.toml" \
            --recursive \
            --format json \
            --skip-git . > osv-results.json &

          OSV_PID=$!

          echo "🛡️ Semgrep..."
          SEMGREP_RULES="p/security-audit"
          if [ "${{ steps.detect.outputs.react }}" = "true" ]; then
            SEMGREP_RULES="p/security-audit,p/react"
          fi

          semgrep ci \
            --config="$SEMGREP_RULES" \
            --severity ERROR \
            --quiet &

          SEMGREP_PID=$!

          wait $GITLEAKS_PID
          wait $OSV_PID
          wait $SEMGREP_PID

          echo "✅ Scanners finalizados."

      # =====================================================
      # SECURITY GATE
      # =====================================================

      - name: Enforce Security Gate
        run: |
          echo "⚖️ Verificando vulnerabilidades..."

          if [ ! -f osv-results.json ]; then
            echo "Nenhum resultado OSV."
            exit 0
          fi

          HIGH_VULNS=$(jq '
            [.results[]?.packages[]?.vulnerabilities[]? 
            | select(
                ((.database_specific.cvssScore // 0) >= 7) or
                ((.severity // "") | test("HIGH|CRITICAL"; "i"))
              )
            ] | length
          ' osv-results.json)

          echo "HIGH/CRITICAL detectadas: $HIGH_VULNS"

          if [ "$HIGH_VULNS" -gt 0 ]; then
            echo "❌ Vulnerabilidades críticas detectadas!"
            exit 1
          fi

          echo "✅ Security Gate aprovado."

      # =====================================================
      # LIGHT AUDITS
      # =====================================================

      - name: NPM Audit
        if: steps.detect.outputs.node == 'true' && hashFiles('**/package-lock.json') != ''
        run: |
          npm audit --audit-level=high || true

      - name: pip-audit
        if: steps.detect.outputs.python == 'true'
        run: |
          pip install pip-audit
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt || true
          fi

      # =====================================================
      # SUMMARY
      # =====================================================

      - name: Security Scan Summary
        if: always()
        run: |
          echo "============================================"
          echo "📊 Security Scan Summary"
          echo "============================================"
          echo "🔐 Gitleaks   → Secrets scan"
          echo "🛡️ Semgrep    → SAST scan"
          echo "📦 OSV        → Dependency scan"
          echo "📦 Audits     → Lightweight checks"
          echo "============================================"