name: Alpha Security

on:
  workflow_call:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write
  packages: read

jobs:
  security:
    name: Universal Security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

# =====================================================
# 🧰 Ensure dependencies
# =====================================================

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

# =====================================================
# 🔎 Detect project type
# =====================================================

      - name: Detect project type
        id: detect
        run: |
          echo "🔍 Detectando tipo de projeto..."

          if [ -s package.json ] && jq -e . package.json >/dev/null 2>&1; then
            echo "node=true" >> $GITHUB_OUTPUT
            echo "✅ Node detectado"

            if jq -e '.dependencies.react or .devDependencies.react' package.json >/dev/null 2>&1; then
              echo "react=true" >> $GITHUB_OUTPUT
              echo "⚛️ React detectado"
            fi
          fi

          if [ -f requirements.txt ] || [ -f pyproject.toml ]; then
            echo "python=true" >> $GITHUB_OUTPUT
            echo "🐍 Python detectado"
          fi

          if [ -f Dockerfile ]; then
            echo "docker=true" >> $GITHUB_OUTPUT
            echo "🐳 Docker detectado"
          fi

          if [ -f go.mod ]; then
            echo "go=true" >> $GITHUB_OUTPUT
            echo "🐹 Go detectado"
          fi

# =====================================================
# 🔑 Node Setup
# =====================================================

      - name: Setup Node
        if: steps.detect.outputs.node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@area-tech-alpha'

      - name: Configure npm auth
        if: steps.detect.outputs.node == 'true'
        run: |
          echo "@area-tech-alpha:registry=https://npm.pkg.github.com/" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# =====================================================
# ⚡ Install security tools
# =====================================================

      - name: Install OSV Scanner
        run: |
          echo "📦 Instalando OSV Scanner..."
          OSV_URL=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/google/osv-scanner/releases/latest \
            | jq -r '.assets[] | select(.name | contains("linux_amd64") and (contains("exe") | not) and (contains("SHA256") | not)) | .browser_download_url' \
            | head -n1)

          if [ -z "$OSV_URL" ] || [ "$OSV_URL" == "null" ]; then
            echo "❌ Falha ao obter OSV Scanner"
            exit 1
          fi

          curl -L "$OSV_URL" -o osv-scanner
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/

      - name: Install Gitleaks
        run: |
          echo "🔐 Instalando Gitleaks..."
          URL=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | jq -r '.assets[] | select(.name | contains("linux_x64.tar.gz")) | .browser_download_url' \
            | head -n1)

          if [ -z "$URL" ] || [ "$URL" == "null" ]; then
            echo "❌ Falha ao obter Gitleaks"
            exit 1
          fi

          curl -L "$URL" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/
          rm gitleaks.tar.gz

      - name: Install Semgrep
        run: pip install semgrep --quiet --break-system-packages

# =====================================================
# 🔐 Checkout DevSecOps config
# =====================================================

      - name: Checkout DevSecOps Config
        uses: actions/checkout@v4
        with:
          repository: Area-tech-alpha/DevSecOps
          ref: main
          path: devsecops
          fetch-depth: 1

# =====================================================
# 🚀 Parallel Scans
# =====================================================

      - name: Run Security Scanners
        run: |
          echo "🔐 Rodando Gitleaks..."
          gitleaks detect \
            --source="." \
            --config="devsecops/security/gitleaks.toml" \
            --redact -v &
          PID_GIT=$!

          echo "📦 Rodando OSV Scanner..."
          osv-scanner scan \
            --config="devsecops/security/osv-scanner.toml" \
            --recursive \
            --format json \
            --skip-git . > osv-results.json 2>osv-errors.log &
          PID_OSV=$!

          echo "🛡️ Rodando Semgrep..."
          if [ "${{ steps.detect.outputs.react }}" == "true" ]; then
            semgrep scan --config="p/security-audit,p/react" --quiet &
          else
            semgrep scan --config="p/security-audit" --quiet &
          fi
          PID_SEM=$!

          set +e
          wait $PID_GIT; EXIT_GIT=$?
          wait $PID_OSV; EXIT_OSV=$?
          wait $PID_SEM; EXIT_SEM=$?
          set -e

          echo "✅ Background tasks finalizadas"

          if [ $EXIT_GIT -ne 0 ]; then
            echo "❌ Segredos detectados (Gitleaks)"
            exit 1
          fi

          if [ $EXIT_SEM -ne 0 ]; then
            echo "❌ Vulnerabilidades estruturais detectadas (Semgrep)"
            exit 1
          fi

          if [ $EXIT_OSV -ne 0 ]; then
            echo "⚠️ OSV retornou erro ou vulnerabilidades — será avaliado no gate"
          fi

# =====================================================
# 💡 OSV remediation advice
# =====================================================

      - name: OSV Fix Suggestions
        run: |
          if [ ! -f osv-results.json ]; then
            echo "❌ OSV não gerou output"
            exit 1
          fi

          if [ ! -s osv-results.json ]; then
            echo "✅ Nenhuma vulnerabilidade encontrada"
            exit 0
          fi

          if ! jq -e . osv-results.json >/dev/null 2>&1; then
            echo "❌ JSON inválido"
            exit 1
          fi

          VULNS=$(jq '
            [
              .results[]?
              | (
                  .packages[]?.vulnerabilities[]?,
                  .vulnerabilities[]?
                )
            ] | length
          ' osv-results.json)

          if (( VULNS == 0 )); then
            echo "✅ Nenhuma vulnerabilidade encontrada"
            exit 0
          fi

          echo "💡 Tentando correções automáticas..."

          find . -name "package-lock.json" \
                 -o -name "yarn.lock" \
                 -o -name "pnpm-lock.yaml" \
                 -o -name "go.sum" \
                 -o -name "Pipfile.lock" \
                 -o -name "poetry.lock" | while read lockfile; do

            DIR=$(dirname "$lockfile")

            osv-scanner fix \
              --strategy=relax \
              --upgrade-config=major \
              --data-source=native \
              -L "$lockfile" || true

          done

# =====================================================
# 🚨 Security Gate (ROBUSTO)
# =====================================================

      - name: Enforce Security Gate
        run: |
          echo "⚖️ Verificando severidade..."

          if [ ! -f osv-results.json ]; then
            echo "❌ OSV não gerou output — falha"
            exit 1
          fi

          if [ ! -s osv-results.json ]; then
            echo "✅ Nenhuma vulnerabilidade"
            exit 0
          fi

          if ! jq -e . osv-results.json >/dev/null 2>&1; then
            echo "❌ JSON inválido"
            exit 1
          fi

          HIGH_VULNS=$(jq '
            [
              .results[]?
              | (
                  .packages[]?.vulnerabilities[]?,
                  .vulnerabilities[]?
                )
              | select(
                  (.database_specific.cvssScore // 0) >= 7
                  or
                  ((.database_specific.severity // "") | ascii_upcase | test("HIGH|CRITICAL"))
                  or
                  ((.severity[]?.score | tonumber? // 0) >= 7)
                )
            ] | length
          ' osv-results.json)

          echo "🔢 HIGH/CRITICAL: $HIGH_VULNS"

          if (( HIGH_VULNS > 0 )); then
            echo "❌ Vulnerabilidades críticas detectadas"

            jq -r '
              .results[]?
              | (
                  .packages[]?.vulnerabilities[]?,
                  .vulnerabilities[]?
                )
              | select(
                  (.database_specific.cvssScore // 0) >= 7
                  or
                  ((.database_specific.severity // "") | ascii_upcase | test("HIGH|CRITICAL"))
                  or
                  ((.severity[]?.score | tonumber? // 0) >= 7)
                )
              | "• \(.id // "N/A") - \(.summary // "Sem descrição")"
            ' osv-results.json

            exit 1
          fi

          echo "✅ Nenhuma vulnerabilidade crítica"

# =====================================================
# 📦 Lightweight Audits
# =====================================================

      - name: NPM Audit
        if: steps.detect.outputs.node == 'true' && hashFiles('**/package-lock.json') != ''
        run: npm audit --audit-level=high || true

      - name: pip audit
        if: steps.detect.outputs.python == 'true'
        run: |
          pip install pip-audit --quiet --break-system-packages
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt || true
          fi

# =====================================================
# 📊 Summary
# =====================================================

      - name: Security Summary
        if: always()
        run: |
          echo "======================================"
          echo "🔐 Alpha Security Scan Completed"
          echo "======================================"
          echo "Gitleaks  ✔"
          echo "Semgrep   ✔"
          echo "OSV Scan  ✔"
          echo "Audits    ✔"
          echo "======================================"

