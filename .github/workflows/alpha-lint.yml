name: Alpha Lint

on:
  workflow_call:

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      # Checkout do repositório que está sendo validado
      - name: Checkout Target Repo
        uses: actions/checkout@v4

      # Checkout do repositório central DevSecOps
      - name: Checkout DevSecOps Config
        uses: actions/checkout@v4
        with:
          repository: Area-tech-alpha/DevSecOps
          ref: main
          path: devsecops
          fetch-depth: 1

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Instala ESLint e Prettier isolados
      - name: Install Lint Dependencies
        run: |
          npm install --no-save \
            eslint \
            @eslint/js \
            typescript \
            typescript-eslint \
            eslint-config-prettier \
            prettier

      # Executa ESLint usando configuração central
      - name: Run ESLint
        run: |
          npx eslint . \
            --config devsecops/lint-config/eslint.config.mjs \
            --ext .js,.ts,.tsx \
            --no-error-on-unmatched-pattern

      # Verificação do Prettier
      - name: Prettier Check
        run: |
          npx prettier . \
            --config devsecops/lint/.prettierrc \
            --check .