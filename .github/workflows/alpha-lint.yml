name: Alpha Lint

on:
  workflow_call:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  lint:
    name: "Universal Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Target Repo
        uses: actions/checkout@v4

      # --------------------------------
      # Detect project type & Manager
      # --------------------------------
      - name: Detect project type
        id: detect
        run: |
          if [ -s package.json ] && jq -e . package.json >/dev/null 2>&1; then
            echo "node=true" >> $GITHUB_OUTPUT
            if [ -f pnpm-lock.yaml ] || grep -q "workspace:" package.json; then
              echo "manager=pnpm" >> $GITHUB_OUTPUT
            elif [ -f yarn.lock ]; then
              echo "manager=yarn" >> $GITHUB_OUTPUT
            else
              echo "manager=npm" >> $GITHUB_OUTPUT
            fi
          fi
          if [ -f requirements.txt ] || [ -f pyproject.toml ]; then
            echo "python=true" >> $GITHUB_OUTPUT
          fi

      # --------------------------------
      # Setup Managers
      # --------------------------------
      - name: Setup pnpm
        if: steps.detect.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        if: steps.detect.outputs.node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@area-tech-alpha'

      # --------------------------------
      # Cache & Auth
      # --------------------------------
      - name: Cache node_modules
        id: cache-nm
        if: steps.detect.outputs.node == 'true'
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.pnpm-store
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json', '**/pnpm-lock.yaml', '**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Create .npmrc for Auth
        if: steps.detect.outputs.node == 'true' && steps.cache-nm.outputs.cache-hit != 'true'
        run: |
          echo "@area-tech-alpha:registry=https://npm.pkg.github.com/" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------------
      # Dependencies
      # --------------------------------
      - name: Install Project Dependencies (Node)
        if: steps.detect.outputs.node == 'true' && steps.cache-nm.outputs.cache-hit != 'true'
        run: |
          echo "📦 Installing project dependencies (cache miss) using ${{ steps.detect.outputs.manager }}"
          if [ "${{ steps.detect.outputs.manager }}" == "pnpm" ]; then
            pnpm install --no-frozen-lockfile
          elif [ "${{ steps.detect.outputs.manager }}" == "yarn" ]; then
            yarn install --frozen-lockfile || yarn install
          elif [ -f package-lock.json ]; then
            npm ci --legacy-peer-deps || npm install --legacy-peer-deps
          else
            npm install --legacy-peer-deps
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------------
      # Linting Tools (Isolated)
      # --------------------------------
      - name: Checkout DevSecOps Config
        if: steps.detect.outputs.node == 'true'
        uses: actions/checkout@v4
        with:
          repository: Area-tech-alpha/DevSecOps
          ref: main
          path: devsecops
          fetch-depth: 1

      - name: Install Lint Tools (Node)
        if: steps.detect.outputs.node == 'true'
        run: |
          # Isolate tool dependencies from project dependencies
          cd devsecops/lint
          npm init -y
          npm install --no-save --legacy-peer-deps \
            eslint@9 @eslint/js typescript typescript-eslint eslint-config-prettier globals

      - name: Run ESLint (Node)
        if: steps.detect.outputs.node == 'true'
        run: |
          export ESLINT_USE_FLAT_CONFIG=true
          ./devsecops/lint/node_modules/.bin/eslint . \
            --config devsecops/lint/eslint.config.mjs \
            --no-error-on-unmatched-pattern
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_dummy"
          ESLINT_USE_FLAT_CONFIG: "true"

      # =====================================================
      # PYTHON LINTING
      # =====================================================
      - name: Setup Python
        if: steps.detect.outputs.python == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python Linters
        if: steps.detect.outputs.python == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff (Python Linter)
        if: steps.detect.outputs.python == 'true'
        run: |
          echo "🔎 Running Ruff"
          ruff check .
