name: Alpha Lint

on:
  workflow_call:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  lint:
    name: "Universal Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # --------------------------------
      # Checkout global
      # --------------------------------
      - name: Checkout Target Repo
        uses: actions/checkout@v4

      # --------------------------------
      # Setup de Cache universal
      # --------------------------------
      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      # --------------------------------
      # Detect project type
      # --------------------------------
      - name: Detect project type
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "node=true" >> $GITHUB_OUTPUT
          fi

          if [ -f requirements.txt ] || [ -f pyproject.toml ]; then
            echo "python=true" >> $GITHUB_OUTPUT
          fi

          if [ -f Dockerfile ]; then
            echo "docker=true" >> $GITHUB_OUTPUT
          fi

      # =====================================================
      # NODE / TYPESCRIPT LINTING
      # =====================================================

      - name: Checkout DevSecOps Config (Node)
        if: steps.detect.outputs.node == 'true'
        uses: actions/checkout@v4
        with:
          repository: Area-tech-alpha/DevSecOps
          ref: main
          path: devsecops
          fetch-depth: 1

      - name: Setup Node
        if: steps.detect.outputs.node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@area-tech-alpha'

      - name: Create .npmrc for Auth
        if: steps.detect.outputs.node == 'true' && steps.cache-nm.outputs.cache-hit != 'true'
        run: |
          echo "@area-tech-alpha:registry=https://npm.pkg.github.com/" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Project Dependencies (Node)
        if: steps.detect.outputs.node == 'true' && steps.cache-nm.outputs.cache-hit != 'true'
        run: |
          echo "📦 Installing project dependencies (cache miss)"
          if [ -f package-lock.json ]; then
            npm ci --legacy-peer-deps || npm install --legacy-peer-deps
          else
            npm install --legacy-peer-deps
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Lint Tools (Node)
        if: steps.detect.outputs.node == 'true'
        run: |
          npm install --no-save --legacy-peer-deps \
            eslint \
            @eslint/js \
            typescript \
            typescript-eslint \
            eslint-config-prettier \
            globals

      - name: Run ESLint (Node)
        if: steps.detect.outputs.node == 'true'
        run: |
          npx eslint . \
            --config devsecops/lint/eslint.config.mjs \
            --ext .js,.ts,.tsx \
            --no-error-on-unmatched-pattern

      # =====================================================
      # PYTHON LINTING
      # =====================================================

      - name: Setup Python
        if: steps.detect.outputs.python == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python Linters
        if: steps.detect.outputs.python == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff (Python Linter)
        if: steps.detect.outputs.python == 'true'
        run: |
          echo "🔎 Running Ruff (Linting + Format check)"
          ruff check .

      # =====================================================
      # DOCKER LINTING
      # =====================================================

      - name: Run Hadolint (Docker Linter)
        if: steps.detect.outputs.docker == 'true'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL3013 # Ignora pinned versions aviso caso chato