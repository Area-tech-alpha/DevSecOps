name: Alpha Lint

on:
  workflow_call:

  pull_request:
    branches:
      - main

permissions:
  contents: read

# ⚡ Cancela runs duplicados do mesmo branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Checkout do repositório que está sendo validado
      - name: Checkout Target Repo
        uses: actions/checkout@v4

      # ⚡ Cache npm — reutiliza entre runs
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-lint-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-lint-
            ${{ runner.os }}-npm-

      # Checkout do repositório central DevSecOps
      - name: Checkout DevSecOps Config
        uses: actions/checkout@v4
        with:
          repository: Area-tech-alpha/DevSecOps
          ref: main
          path: devsecops
          fetch-depth: 1

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Instala dependências do projeto (necessário para resolver tipos, etc.)
      # --legacy-peer-deps resolve conflitos como @nestjs/axios >=4 vs @nestjs/terminus <=10
      - name: Install Project Dependencies
        run: |
          if [ -f package.json ]; then
            echo "📦 Installing project dependencies (legacy-peer-deps)"
            if [ -f package-lock.json ]; then
              npm ci --legacy-peer-deps || npm install --legacy-peer-deps
            else
              npm install --legacy-peer-deps
            fi
          else
            echo "ℹ️ No package.json found, skipping project deps"
          fi

      # Instala ESLint e Prettier isolados (sem interferir nas deps do projeto)
      - name: Install Lint Tools
        run: |
          npm install --no-save --legacy-peer-deps \
            eslint \
            @eslint/js \
            typescript \
            typescript-eslint \
            eslint-config-prettier \
            prettier

      # Executa ESLint usando configuração central
      - name: Run ESLint
        run: |
          npx eslint . \
            --config devsecops/lint/eslint.config.mjs \
            --ext .js,.ts,.tsx \
            --no-error-on-unmatched-pattern \
            || true