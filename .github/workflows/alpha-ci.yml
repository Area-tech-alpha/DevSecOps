name: Alpha CI

# ============================================================
# REQUIRED WORKFLOW via GitHub Organization Ruleset
#
# Este arquivo é referenciado no Ruleset da org como:
#   Area-tech-alpha/DevSecOps/.github/workflows/alpha-ci.yml@main
#
# Quando aplicado como Required Workflow, o GitHub o executa
# no contexto do repo ALVO (ex: Api_bonapp), fazendo checkout
# daquele repo. Os reusable workflows DEVEM usar paths absolutos
# (owner/repo/path@ref) e não paths locais (./.github/workflows/...)
# pois paths locais resolvem para o repo alvo, não para DevSecOps.
# ============================================================

on:
  # ─────────────────────────────────────────────────────────
  # OBRIGATÓRIO para Required Workflows via Ruleset.
  # O GitHub injeta o contexto de pull_request ao rodar
  # este workflow nos repos filhos via Ruleset.
  # ─────────────────────────────────────────────────────────
  pull_request:

  # ─────────────────────────────────────────────────────────
  # Permite ser chamado diretamente por outros workflows
  # (ex: repos que não usam Ruleset mas querem o CI centralizado)
  # ─────────────────────────────────────────────────────────
  workflow_call:

  # Push no próprio DevSecOps (merge de PRs de config)
  push:
    branches:
      - main

    paths:
      - "src/**"
      - "app/**"
      - "lib/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "*.config.*"
      - "Dockerfile"
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/**"

  # Execução manual
  workflow_dispatch:

# ⚡ Cancela runs obsoletos do mesmo PR/branch
concurrency:
  group: alpha-ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # PATH FILTER — Detecta o que mudou
  # Se só mudaram docs/README, pula TUDO.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  changes:
    name: "🔀 Detect Changes"
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'app/**'
              - 'lib/**'
              - 'pages/**'
              - 'components/**'
              - 'prisma/**'
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.py'
              - '**/*.go'
              - 'package.json'
              - 'package-lock.json'
              - 'requirements.txt'
              - 'pyproject.toml'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - 'tsconfig*.json'
              - '*.config.*'
              - '.github/**'

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # STAGE 1 — Build (gate de entrada)
  # Se falhar, NADA mais roda. Economia máxima.
  # Pula se só mudaram docs (needs.changes.outputs.code == false)
  # workflow_dispatch sempre roda (changes é skipped → if always())
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build:
    name: "🏗 Build"
    needs: [changes]
    if: |
      always() &&
      (needs.changes.result == 'skipped' || needs.changes.outputs.code == 'true')
    uses: Area-tech-alpha/DevSecOps/.github/workflows/alpha-build.yml@main
    secrets: inherit

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # STAGE 2 — Lint + Test + Security (paralelo)
  # Só rodam se o Build passou. Os 3 rodam ao
  # mesmo tempo, pois não dependem entre si.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  lint:
    name: "🔍 Lint"
    needs: [build]
    uses: Area-tech-alpha/DevSecOps/.github/workflows/alpha-lint.yml@main
    secrets: inherit

  test:
    name: "🧪 Unit Tests"
    needs: [build]
    uses: Area-tech-alpha/DevSecOps/.github/workflows/alpha-test.yml@main
    secrets: inherit

  security:
    name: "🔒 Security"
    needs: [build]
    uses: Area-tech-alpha/DevSecOps/.github/workflows/alpha-security.yaml@main
    secrets: inherit

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # STAGE 3 — E2E (job mais caro)
  # Só roda depois que Lint, Test e Security
  # passaram. Evita gastar ~8 min à toa.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  e2e:
    name: "🧪 E2E Tests"
    needs: [lint, test, security]
    uses: Area-tech-alpha/DevSecOps/.github/workflows/alpha-e2e.yml@main
    secrets: inherit

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # GATE — Status único para Branch Protection
  # Configure o Ruleset para exigir: "✅ CI Gate"
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  gate:
    name: "✅ CI Gate"
    needs: [build, lint, test, security, e2e]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs
        run: |
          echo "📊 Pipeline Fail-Fast — Resultados:"
          echo ""
          echo "  Stage 1:"
          echo "    🏗 Build    → ${{ needs.build.result }}"
          echo ""
          echo "  Stage 2:"
          echo "    🔍 Lint     → ${{ needs.lint.result }}"
          echo "    🧪 Test     → ${{ needs.test.result }}"
          echo "    🔒 Security → ${{ needs.security.result }}"
          echo ""
          echo "  Stage 3:"
          echo "    🧪 E2E      → ${{ needs.e2e.result }}"
          echo ""

          if [[ "${{ needs.build.result }}"    == "failure" ||
                "${{ needs.lint.result }}"     == "failure" ||
                "${{ needs.test.result }}"     == "failure" ||
                "${{ needs.security.result }}" == "failure" ||
                "${{ needs.e2e.result }}"      == "failure" ]]; then
            echo "❌ Um ou mais jobs falharam."
            exit 1
          fi

          echo "✅ Todos os checks passaram."
